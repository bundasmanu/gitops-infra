apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: postgres-kamailio
  namespace: argocd

spec:
  generators:
    - git:
        repoURL: https://github.com/bundasmanu/gitops-infra
        revision: main
        files:
          - path: postgres-kamailio/*.yml

  template:
    metadata:
      name: "{{name}}"

    spec:
      project: default

      source:
        repoURL: https://github.com/bundasmanu/postgres-kamailio-docker
        targetRevision: main
        path: helm/kamailio-db

        helm:
          parameters:
            - name: env_vars.postgres_user
              value: "{{env_vars.postgres_user}}"

            - name: env_vars.postgres_password
              value: "{{env_vars.postgres_password}}"

            - name: env_vars.postgres_db
              value: "{{env_vars.postgres_db}}"

      destination:
        name: in-cluster
        namespace: kamailio

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
