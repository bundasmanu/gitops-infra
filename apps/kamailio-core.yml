---

name: kamailio-core
repoURL: https://github.com/bundasmanu/kamailio-core
chartPath: k8s/helm/kamailio-core

namespace: kamailio

# L4 edge: charts/nginx-sip-edge (see apps/nginx-sip-edge.yml). Kamailio Service is defined in the webrtc-gateway chart.
chart_values:
  replicaCount: 2

  image:
    repository: bundasmanu/kamailio-core
    tag: latest
    pullPolicy: Always

  hostNetwork: false

  secrets:
    existingSecret: kamailio-core-secrets

  volumeMounts:
    - name: config
      mountPath: /tmp/config
