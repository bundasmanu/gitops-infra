---

name: nginx-sip-edge
repoURL: https://github.com/bundasmanu/gitops-infra
chartPath: charts/nginx-sip-edge

namespace: kamailio

# In each target cluster Service/Deploy use resource name nginx-sip-edge (fullnameOverride),
# regardless of Argo Application name nginx-sip-edge-<env> on this Argo CD.
chart_values:
  fullnameOverride: nginx-sip-edge

# Other defaults (upstream, ports, service type): charts/nginx-sip-edge/values.yaml.
# Per-cluster overrides: clusters/<cluster>/nginx-sip-edge.yml/overrides.yml.
