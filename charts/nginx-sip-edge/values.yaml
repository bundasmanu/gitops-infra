---

# Kamailio Headless/Cluster Service in the webrtc-gateway chart; nginx stream proxies to this DNS (all replicas).
upstream:
  host: webrtc-gateway.kamailio.svc.cluster.local
  sipPort: 5060
  tlsPort: 5061

replicaCount: 1

image:
  repository: nginx
  tag: "1.27-alpine"
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  # Optional: public DNS for this LoadBalancer (external-dns or manual A/AAAA → LB).
  # With wss.enabled, the same Service also exposes 443 for HTTPS/WSS (server_name + TLS on nginx).
  annotations: {}
  # external-dns.alpha.kubernetes.io/hostname: sip.edge.example.com

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# HTTPS + WebSocket (browser wss://) — TLS on nginx edge; upstream is Kamailio WebSocket.
# SIP stream on 5060/5061 stays in stream {} (passthrough).
# When upstream.https is true, proxy_pass uses https:// (e.g. WebSocket over TLS on tlsPort — no separate :8080 HTTP).
wss:
  enabled: false
  # nginx server_name; use space-separated hosts for DNS + localhost (must match TLS cert SANs).
  serverName: ""
  # Path Kamailio serves WebSocket on (e.g. /ws); default / forwards the full URI.
  path: /
  proxyReadTimeout: 86400s
  upstream:
    # Leave empty to reuse upstream.host (Kamailio Service DNS).
    host: ""
    # Match Kamailio WebSocket listener (often same as SIP-TLS port when using WSS only).
    port: 5061
    # true → proxy_pass https:// + TLS to upstream (use when Kamailio serves WSS on this port).
    https: true
    # SNI sent to Kamailio (default: upstream host).
    sslServerName: ""
    # on | off — off typical for in-cluster Kamailio using cluster.local or self-signed cert.
    sslVerify: "off"
  tls:
    # TLS cert presented to browsers for wss:// — separate from SIP TLS on Kamailio.
    existingSecret: ""
    mountPath: /etc/nginx/wss-tls
    certFile: tls.crt
    keyFile: tls.key
