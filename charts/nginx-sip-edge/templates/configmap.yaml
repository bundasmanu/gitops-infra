{{- $wssHost := .Values.wss.upstream.host | default .Values.upstream.host }}
{{- $wssPort := .Values.wss.upstream.port }}
{{- if .Values.wss.enabled }}
{{- $_ := required "wss.serverName is required when wss.enabled" .Values.wss.serverName }}
{{- $_ := required "wss.tls.existingSecret is required when wss.enabled" .Values.wss.tls.existingSecret }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nginx-sip-edge.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "nginx-sip-edge.name" . }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log info;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }
{{- if .Values.wss.enabled }}

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }
        upstream kamailio_wss {
            server {{ $wssHost }}:{{ $wssPort }};
        }
        server {
            listen 443 ssl;
            server_name {{ .Values.wss.serverName }};
            ssl_certificate {{ .Values.wss.tls.mountPath }}/{{ .Values.wss.tls.certFile }};
            ssl_certificate_key {{ .Values.wss.tls.mountPath }}/{{ .Values.wss.tls.keyFile }};
            ssl_protocols TLSv1.2 TLSv1.3;
            location {{ .Values.wss.path }} {
                proxy_pass http://kamailio_wss;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout {{ .Values.wss.proxyReadTimeout }};
            }
        }
    }
{{- end }}

    stream {
      upstream kamailio_sip {
        server {{ .Values.upstream.host }}:{{ .Values.upstream.sipPort }};
      }

      upstream kamailio_tls {
        server {{ .Values.upstream.host }}:{{ .Values.upstream.tlsPort }};
      }

      server {
        listen {{ .Values.upstream.sipPort }} udp;
        proxy_pass kamailio_sip;
        proxy_timeout 10s;
      }

      server {
        listen {{ .Values.upstream.sipPort }};
        proxy_pass kamailio_sip;
        proxy_timeout 10s;
      }

      server {
        listen {{ .Values.upstream.tlsPort }};
        proxy_pass kamailio_tls;
        proxy_timeout 10s;
      }
    }
