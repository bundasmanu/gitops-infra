---

# TLS for nginx WSS on 443 (browser-facing). Separate from kamailio-tls (SIP).
# Requires cert-manager. Self-signed: browsers warn unless you trust the CA —
# swap to LetsEncrypt/clusterIssuer later for trusted certs.
# Keep dnsNames in sync with wss.serverName in overrides (zone apex + localhost for local JsSIP).
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: nginx-wss-selfsigned
  namespace: kamailio
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nginx-wss-tls-cert
  namespace: kamailio
spec:
  secretName: nginx-wss-tls
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: RSA
    size: 4096
  dnsNames:
    - sip-edge.com
    - localhost
  issuerRef:
    name: nginx-wss-selfsigned
    kind: Issuer
