---

# References applicationsets/ outside this folder; CI uses:
# kubectl kustomize --load-restrictor LoadRestrictionsNone .

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../applicationsets/generic-postgres-kamailio.yml

patches:
  - target:
      kind: ApplicationSet
      name: postgres-kamailio
    patch: |-
      - op: replace
        path: /spec/generators/0/matrix/generators/1/git/files/0/path
        value: clusters/dev-01/postgres-kamailio.yml/overrides.yml
