---

# Must match environments/active-env.yml for this row to be selected.
env: dev-01

name-dest: in-cluster
cluster: docker-desktop

# Per-cluster Helm overrides (merged on top of apps/rtpengine.yml chart_values).
# persistence.storageClass requires clusters/<cluster>/storage (bootstrap workflow).
chart_values_overrides:

  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi

  rtpengine:
    user: rtpengine
    confDir: /etc/rtpengine/conf
    logDir: /etc/rtpengine/logs
    recordingsDir: /etc/rtpengine/recordings
    logFilename: rtpengine
    listen:
      externalIP: "188.80.27.108"
      ngPort: 2223
      cliPort: 2224
      httpPort: 2226
    defaultInterface:
      minPort: 10000
      maxPort: 20000
