---

# Self-hosted runner: Linux or macOS (Docker Desktop / Colima / k3s, etc.).
# Requires kubectl pointing at your cluster (~/.kube/config or runner env).
# Order: cert-manager (CRDs) -> cluster storage -> Argo CD -> ApplicationSets.

name: Install Argo CD and ApplicationSets

on:
  workflow_dispatch:
    inputs:
      cluster:
        description: Folder under clusters/ (e.g. dev-01)
        required: true
        default: dev-01
        type: string

      applicationset:
        description: Overlay folder name or all
        required: false
        default: all
        type: string

      kubectl_context:
        description: kubectl context name (leave default empty to use current context)
        required: false
        default: ""
        type: string

jobs:
  install:
    runs-on:
      - self-hosted

    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: kubectl context
        env:
          CTX: ${{ inputs.kubectl_context }}
        run: |
          command -v kubectl >/dev/null || { echo "kubectl not found" >&2; exit 1; }
          if [ -n "${CTX}" ]; then kubectl config use-context "${CTX}"; fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: cert-manager
        env:
          CERT_MANAGER_VERSION: v1.20.2
        run: |
          set -euo pipefail
          if kubectl get deployment cert-manager -n cert-manager >/dev/null 2>&1; then
            echo "cert-manager already installed."
            exit 0
          fi
          kubectl apply -f \
            "https://github.com/cert-manager/cert-manager/releases/download/${CERT_MANAGER_VERSION}/cert-manager.yaml"
          kubectl wait --for=condition=Available deployment --all -n cert-manager --timeout=300s

      - name: Cluster storage
        env:
          CLUSTER: ${{ inputs.cluster }}
        run: |
          set -euo pipefail
          STORAGE="clusters/${CLUSTER}/storage"
          if [ ! -d "${STORAGE}" ]; then
            echo "No storage overlay at ${STORAGE}; skipping."
            exit 0
          fi
          if kubectl get storageclass local-path >/dev/null 2>&1; then
            echo "StorageClass local-path already present."
            exit 0
          fi
          kubectl kustomize --load-restrictor LoadRestrictionsNone "${STORAGE}" | kubectl apply -f -
          kubectl wait --for=condition=Available deployment/local-path-provisioner \
            -n local-path-storage --timeout=120s

      - name: Argo CD
        run: |
          set -euo pipefail
          if kubectl get deployment argocd-server -n argocd >/dev/null 2>&1; then
            echo "Argo CD already installed."
            exit 0
          fi
      
          ARGOCD_VERSION=v2.11.3
      
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
      
          kubectl apply --server-side --force-conflicts -n argocd -f \
            https://raw.githubusercontent.com/argoproj/argo-cd/${ARGOCD_VERSION}/manifests/install.yaml

      - name: Create namespaces
        run: |
          set -euo pipefail
          for ns in b2bua kamailio rtpengine; do
            kubectl create namespace "${ns}" --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: ApplicationSets
        env:
          CLUSTER: ${{ inputs.cluster }}
          FILTER: ${{ inputs.applicationset }}
        run: |
          kubectl kustomize --help >/dev/null
          ROOT="clusters/${CLUSTER}"
          test -d "${ROOT}"
          found=0
          for candidate in "${ROOT}"/*; do
            [ -d "${candidate}" ] || continue
            base="$(basename "${candidate}")"
            if [ "${FILTER}" != "all" ]; then
              stripped="${base%.yml}"
              if [ "${stripped}" != "${FILTER}" ] && [ "${base}" != "${FILTER}" ]; then
                continue
              fi
            fi
            if [ ! -f "${candidate}/kustomization.yml" ] && [ ! -f "${candidate}/kustomization.yaml" ]; then
              continue
            fi
            kubectl kustomize --load-restrictor LoadRestrictionsNone "${candidate}" | kubectl apply -f -
            found=$((found + 1))
          done
          test "${found}" -gt 0
